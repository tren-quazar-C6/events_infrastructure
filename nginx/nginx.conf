# ============================================================================
# Quasar · Nginx · Configuración global
# ----------------------------------------------------------------------------
# Este archivo define el comportamiento general de Nginx.
# Los archivos de cada subdominio viven en conf.d/ y se incluyen al final.
# ============================================================================

user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # ---------- MIME types ----------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------- Formato de logs ----------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # ---------- Performance ----------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ---------- Compresión ----------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ---------- Tamaño máximo de body ----------
    # 20MB cubre subida de imágenes de eventos sin problemas
    client_max_body_size 20M;

    # ---------- Headers de seguridad básicos ----------
    server_tokens off;  # No exponer versión de Nginx
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------- Incluir configs de cada subdominio ----------
    include /etc/nginx/conf.d/*.conf;
}
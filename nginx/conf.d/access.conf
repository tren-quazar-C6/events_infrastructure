# ============================================================================
# Portal Access (control de acceso) — access.quasar.andrescortes.dev
# Backend: events_access (ASP.NET Core)
# ============================================================================

server {
    listen 80;
    server_name access.quasar.andrescortes.dev;

    access_log /var/log/nginx/access_access.log main;
    error_log  /var/log/nginx/access_error.log  warn;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $upstream "http://access:8080";
        proxy_pass $upstream;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
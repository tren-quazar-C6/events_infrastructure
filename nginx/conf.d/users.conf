# ============================================================================
# Portal Users (público) — quasar.andrescortes.dev
# Backend: events_users (Laravel)
# ============================================================================

server {
    listen 80;
    server_name quasar.andrescortes.dev;

    access_log /var/log/nginx/users_access.log main;
    error_log  /var/log/nginx/users_error.log  warn;

    # Resolver DNS interno de Docker (127.0.0.11)
    # Permite levantar Nginx aunque el upstream no exista todavía.
    resolver 127.0.0.11 valid=30s;

    location / {
        set $upstream "http://users:8000";
        proxy_pass $upstream;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
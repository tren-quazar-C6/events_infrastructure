services:
  # ---------- MySQL (un servidor, una BD compartida) ----------
  mysql:
    image: mysql:8
    container_name: quasar_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: ${TZ}
      # Variables que necesita el script de init
      MYSQL_USERS_USER: ${MYSQL_USERS_USER}
      MYSQL_USERS_PASSWORD: ${MYSQL_USERS_PASSWORD}
      MYSQL_ADMIN_USER: ${MYSQL_ADMIN_USER}
      MYSQL_ADMIN_PASSWORD: ${MYSQL_ADMIN_PASSWORD}
      MYSQL_TICKETS_USER: ${MYSQL_TICKETS_USER}
      MYSQL_TICKETS_PASSWORD: ${MYSQL_TICKETS_PASSWORD}
      MYSQL_ACCESS_USER: ${MYSQL_ACCESS_USER}
      MYSQL_ACCESS_PASSWORD: ${MYSQL_ACCESS_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - quasar_mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - quasar_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------- MongoDB ----------
  mongo:
    image: mongo:7
    container_name: quasar_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
      MONGO_APP_USER: ${MONGO_USER}
      MONGO_APP_PASSWORD: ${MONGO_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - quasar_mongo_data:/data/db
      - ./mongo/init:/docker-entrypoint-initdb.d:ro
    networks:
      - quasar_network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

    # ---------- events_admin (ASP.NET MVC) ----------
  admin:
    image: ghcr.io/tren-quazar-c6/events_admin:latest
    container_name: quasar_admin
    restart: unless-stopped
    pull_policy: always
    environment:
      ASPNETCORE_ENVIRONMENT: ${ADMIN_ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MySQL: "Server=mysql;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_ADMIN_USER};Password=${MYSQL_ADMIN_PASSWORD};"
      MongoDB__ConnectionString: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=${MONGO_DB}"
      MongoDB__Database: ${MONGO_DB}
      TZ: ${TZ}
    ports:
      - "8101:8080"
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - quasar_network

volumes:
  quasar_mysql_data:
  quasar_mongo_data:

networks:
  quasar_network:
    driver: bridge
    name: quasar_network
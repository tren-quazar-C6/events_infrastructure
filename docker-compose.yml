services:
  # ---------- MySQL (un servidor, una BD compartida) ----------
  mysql:
    image: mysql:8
    container_name: quasar_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: ${TZ}
      # Variables que necesita el script de init
      MYSQL_USERS_USER: ${MYSQL_USERS_USER}
      MYSQL_USERS_PASSWORD: ${MYSQL_USERS_PASSWORD}
      MYSQL_ADMIN_USER: ${MYSQL_ADMIN_USER}
      MYSQL_ADMIN_PASSWORD: ${MYSQL_ADMIN_PASSWORD}
      MYSQL_TICKETS_USER: ${MYSQL_TICKETS_USER}
      MYSQL_TICKETS_PASSWORD: ${MYSQL_TICKETS_PASSWORD}
      MYSQL_ACCESS_USER: ${MYSQL_ACCESS_USER}
      MYSQL_ACCESS_PASSWORD: ${MYSQL_ACCESS_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - quasar_mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - quasar_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------- MongoDB ----------
  mongo:
    image: mongo:7
    container_name: quasar_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
      MONGO_APP_USER: ${MONGO_USER}
      MONGO_APP_PASSWORD: ${MONGO_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - quasar_mongo_data:/data/db
      - ./mongo/init:/docker-entrypoint-initdb.d:ro
    networks:
      - quasar_network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------- Nginx ----------
  nginx:
    image: nginx:alpine
    container_name: quasar_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - quasar_network
    environment:
      TZ: ${TZ}

volumes:
  quasar_mysql_data:
  quasar_mongo_data:

networks:
  quasar_network:
    driver: bridge
    name: quasar_network